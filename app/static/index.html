<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>chat2dify</title>
    <link rel="stylesheet" href="/static/styles.css?v=workbench-20260604-agents">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>chat2dify</h1>
        <p class="subtitle">Workflow console for the local Dify sidecar</p>
      </div>
      <div class="header-actions">
        <button id="refresh-health" type="button" class="secondary">Refresh</button>
        <span id="health-status" class="status-pill status-muted">Checking</span>
      </div>
    </header>

    <main class="workspace">
      <section class="tool-panel planner-panel" aria-labelledby="planner-title">
        <div class="panel-heading">
          <h2 id="planner-title">Planner Model</h2>
          <span id="planner-status" class="panel-status status-muted">local</span>
        </div>
        <form id="planner-form" class="form-stack">
          <label>
            Provider
            <select id="planner-provider"></select>
          </label>
          <label>
            Model
            <select id="planner-model"></select>
          </label>
          <div id="planner-summary" class="selection-summary"></div>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="knowledge-title">
        <div class="panel-heading">
          <h2 id="knowledge-title">Knowledge</h2>
          <span id="knowledge-status" class="panel-status status-muted">local</span>
        </div>
        <form id="knowledge-form" class="form-stack">
          <label>
            Search datasets
            <input id="knowledge-search" autocomplete="off" placeholder="Policy, repair, support">
          </label>
          <div class="button-row">
            <button id="refresh-datasets" type="submit" class="secondary">Refresh</button>
            <button id="load-more-datasets" type="button" class="secondary" disabled>Load more</button>
          </div>
          <div id="knowledge-selected-summary" class="selection-summary"></div>
          <div id="knowledge-dataset-list" class="dataset-list"></div>
          <label>
            Manual dataset IDs
            <textarea id="knowledge-dataset-ids" rows="4" spellcheck="false" placeholder="dataset uuid, one per line or comma-separated"></textarea>
          </label>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="tools-title">
        <div class="panel-heading">
          <h2 id="tools-title">Tools</h2>
          <span id="tools-status" class="panel-status status-muted">local</span>
        </div>
        <form id="tools-form" class="form-stack">
          <label>
            Search tools
            <input id="tools-search" autocomplete="off" placeholder="Search, query, MCP">
          </label>
          <label>
            Tool type
            <select id="tools-type">
              <option value="all">All</option>
              <option value="builtin">Builtin</option>
              <option value="api">API</option>
              <option value="workflow">Workflow</option>
              <option value="mcp">MCP</option>
            </select>
          </label>
          <button id="refresh-tools" type="submit" class="secondary">Refresh tools</button>
          <div id="tools-selected-summary" class="selection-summary"></div>
          <div id="tools-list" class="dataset-list"></div>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="agents-title">
        <div class="panel-heading">
          <h2 id="agents-title">Agent Strategies</h2>
          <span id="agents-status" class="panel-status status-muted">local</span>
        </div>
        <form id="agents-form" class="form-stack">
          <label>
            Search agent strategies
            <input id="agents-search" autocomplete="off" placeholder="ReAct, planner, assistant">
          </label>
          <button id="refresh-agents" type="submit" class="secondary">Refresh strategies</button>
          <div id="agents-selected-summary" class="selection-summary"></div>
          <div id="agents-list" class="dataset-list"></div>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="create-title">
        <div class="panel-heading">
          <h2 id="create-title">Create</h2>
          <span id="create-status" class="panel-status"></span>
        </div>
        <form id="create-form" class="form-stack">
          <label>
            App name
            <input id="create-app-name" name="app_name" autocomplete="off" placeholder="Customer Support Flow">
          </label>
          <label>
            Request
            <textarea id="create-message" name="message" rows="7" required>Build a workflow that responds politely to customer complaints and summarizes the issue.</textarea>
          </label>
          <button type="submit">Create workflow</button>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="modify-title">
        <div class="panel-heading">
          <h2 id="modify-title">Modify Draft</h2>
          <span id="modify-status" class="panel-status"></span>
        </div>
        <form id="modify-form" class="form-stack">
          <label>
            App ID
            <input id="modify-app-id" name="app_id" autocomplete="off" required placeholder="Dify app id">
          </label>
          <label>
            Expected hash
            <input id="modify-expected-hash" name="expected_hash" autocomplete="off" placeholder="Optional">
          </label>
          <label>
            Change request
            <textarea id="modify-message" name="message" rows="5" required>Make the final answer warmer and more concise.</textarea>
          </label>
          <label class="checkbox-line">
            <input id="modify-allow-destructive" type="checkbox">
            Allow destructive apply
          </label>
          <div class="button-row">
            <button id="load-draft" type="button" class="secondary">Load draft</button>
            <button id="preview-modify" type="button">Preview</button>
            <button id="apply-modify" type="button">Apply</button>
          </div>
        </form>
      </section>

      <section class="tool-panel" aria-labelledby="run-title">
        <div class="panel-heading">
          <h2 id="run-title">Run Draft</h2>
          <span id="run-status" class="panel-status"></span>
        </div>
        <form id="run-form" class="form-stack">
          <label>
            App ID
            <input id="run-app-id" name="app_id" autocomplete="off" required placeholder="Dify app id">
          </label>
          <label>
            Inputs JSON
            <textarea id="run-inputs" name="inputs" rows="6" spellcheck="false" required>{"query":"我要投诉订单配送太慢"}</textarea>
          </label>
          <div class="button-row">
            <button id="format-inputs" type="button" class="secondary">Format JSON</button>
            <button id="reset-inputs" type="button" class="secondary">Reset JSON</button>
          </div>
          <label>
            Timeout seconds
            <input id="run-timeout" name="timeout_seconds" type="number" min="1" step="1" value="120">
          </label>
          <button type="submit">Run draft</button>
        </form>
      </section>

      <section class="history-panel" aria-labelledby="history-title">
        <div class="panel-heading">
          <h2 id="history-title">Recent Apps</h2>
          <button id="clear-history" type="button" class="secondary">Clear</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <section class="result-panel" aria-labelledby="result-title">
        <div class="panel-heading">
          <h2 id="result-title">Result</h2>
          <div class="result-actions">
            <a id="open-workflow" class="ghost-link is-hidden" href="#" target="_blank" rel="noreferrer">Open workflow</a>
            <button id="copy-app-id" type="button" class="secondary" disabled>Copy app ID</button>
            <button id="copy-workflow-url" type="button" class="secondary" disabled>Copy URL</button>
            <button id="copy-hash" type="button" class="secondary" disabled>Copy hash</button>
            <button id="copy-raw-json" type="button" class="secondary">Copy JSON</button>
            <button id="clear-result" type="button" class="secondary">Clear</button>
          </div>
        </div>
        <div id="summary-grid" class="summary-grid"></div>
        <div id="result-tabs" class="result-tabs" role="tablist" aria-label="Result sections">
          <button type="button" class="tab-button is-active" data-tab="changes">Changes</button>
          <button type="button" class="tab-button" data-tab="validation">Validation</button>
          <button type="button" class="tab-button" data-tab="outputs">Outputs</button>
          <button type="button" class="tab-button" data-tab="plan">Plan</button>
          <button type="button" class="tab-button" data-tab="raw">Raw JSON</button>
        </div>
        <section id="tab-changes" class="tab-panel" data-tab-panel="changes"></section>
        <section id="tab-validation" class="tab-panel is-hidden" data-tab-panel="validation"></section>
        <section id="tab-outputs" class="tab-panel is-hidden" data-tab-panel="outputs"></section>
        <section id="tab-plan" class="tab-panel is-hidden" data-tab-panel="plan"></section>
        <section id="tab-raw" class="tab-panel is-hidden" data-tab-panel="raw">
          <pre id="result-json" class="json-output">{}</pre>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=workbench-20260605-planner-models" defer></script>
  </body>
</html>
